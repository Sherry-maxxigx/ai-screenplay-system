services:
  - type: web
    name: ai-screenplay-system
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ZHIPUAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        value: https://sherry-maxxigx.github.io,https://sherry-maxxigx.github.io/ai-screenplay-system/,http://localhost:3000,http://127.0.0.1:8000
        sync: false
